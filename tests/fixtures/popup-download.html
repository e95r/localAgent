<!doctype html><html><body>
<div id="popup" class="overlay" role="dialog" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:10;">
  <button id="close-popup">Close</button>
</div>
<a id="download-link" href="/files/mock.pdf">Download PDF</a>
<script>
  document.getElementById('close-popup').addEventListener('click', () => {
    document.getElementById('popup').style.display='none';
  });
</script>
</body></html>
