<!doctype html>
<html>
<head><title>Modal Page</title></head>
<body>
  <button id="open-modal" onclick="document.getElementById('m').style.display='block'">Open modal</button>
  <div id="m" style="display:none" role="dialog">
    <button id="close-modal" onclick="document.getElementById('m').style.display='none'">Close</button>
    <a id="modal-download" href="/files/modal.pdf" download>Download</a>
  </div>
</body>
</html>
