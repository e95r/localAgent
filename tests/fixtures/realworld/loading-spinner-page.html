<!doctype html><html><body>
<div class="spinner" id="spinner">Loading...</div>
<button id="action" data-agent-id="action" style="display:none" onclick="document.getElementById('out').textContent='done'">Ready Action</button>
<div id="out"></div>
<script>setTimeout(()=>{spinner.style.display='none';action.style.display='block';},450)</script>
</body></html>
